[general]
live_config_reload = false

import = [
  "~/.config/alacritty/themes/themes/afterglow.toml"
]

[env]
TERM = "xterm-256color"

[window]
padding = { x = 5, y = 4 }
opacity = 0.85

[terminal]
shell = "/opt/homebrew/bin/fish"

[cursor]
style = "Block"

[scrolling]
history = 100000
multiplier = 3

[font]
normal = { family = "HackGen35 Console NF", style = "Regular" }
bold = { family = "HackGen35 Console NF", style = "Bold" }
italic = { family = "HackGen35 Console NF", style = "Italic" }
bold_italic = { family = "HackGen35 Console NF", style = "Bold Italic" }
size = 12
offset = { x = 0, y = 1 }

[[hints.enabled]]
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\\s<>\"{}\\^`]+"
hyperlinks = true
command = "open"
post_processing = true
mouse = { enabled = true, mods = "Control" }
binding = { key = "U", mods = "Control|Shift" }
